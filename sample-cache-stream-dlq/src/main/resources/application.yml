# 死信队列专用服务配置
# 建议将死信队列处理独立为单独的服务

# 死信队列消费者实现示例
# 可以根据需要选择不同的策略进行配置（这里的配置是全量配置，用于展示功能，具体推荐使用方式看下方策略选择建议）

# 重要说明：
# - 所有死信队列配置的 target-type 默认为 DeadLetterMessage，无需显式配置
# - 配置名称以 "dlq-" 开头的会自动识别为死信队列配置
# - 如果确实需要自定义 target-type，可以显式配置该参数

# 策略选择建议：
# 1. 小型系统（< 10个队列）：使用 GLOBAL 策略，配置 dlq-global
# 2. 中型系统（10-50个队列）：使用 BY_MESSAGE_TYPE 策略，配置 dlq-type-*
# 3. 大型系统（> 50个队列）：使用 BY_SOURCE_STREAM 策略，配置 dlq-stream-*
# 4. 复杂系统：使用 HYBRID 策略，同时配置多种死信队列

# 服务配置
server:
  port: 8081
  servlet:
    context-path: /dlq-service

# 应用配置
spring:
  application:
    name: sample-cache-stream-dlq
  profiles:
    active: cache
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# 死信队列专用配置
platform:
  cache:
    redis:
      stream:
        consumers:
          enabled: true
          configs:
            # ==================== 全局死信队列 ====================
            # 所有类型的死信消息都发送到 dlq:global
            # target-type 默认为 DeadLetterMessage，无需显式配置
            dlq-global:
              stream-key: "dlq:global"
              group: "dlq-global-processors"
              consumer: "dlq-global-consumer"
              auto-ack: true
              concurrency: 3
              error-strategy: skip
              auto-start: true

            # ==================== 按消息类型分组的死信队列 ====================
            # UserInfo/OrderInfo 类型的死信消息
            dlq-type-userinfo:
              stream-key: "dlq:type:UserInfo"
              group: "dlq-type-processors"
              consumer: "dlq-userinfo-consumer"
              auto-ack: true
              concurrency: 2
              error-strategy: skip
              auto-start: true

            dlq-type-orderinfo:
              stream-key: "dlq:type:OrderInfo"
              group: "dlq-type-processors"
              consumer: "dlq-orderinfo-consumer"
              auto-ack: true
              concurrency: 2
              error-strategy: skip
              auto-start: true

            # ==================== 按源队列分组的死信队列 ====================
            # 来自 user-events/order-events 队列的死信消息
            dlq-stream-user-events:
              stream-key: "dlq:stream:user-events"
              group: "dlq-stream-processors"
              consumer: "dlq-user-events-consumer"
              auto-ack: true
              concurrency: 1
              error-strategy: skip
              auto-start: true

            dlq-stream-order-events:
              stream-key: "dlq:stream:order-events"
              group: "dlq-stream-processors"
              consumer: "dlq-order-events-consumer"
              auto-ack: true
              concurrency: 1
              error-strategy: skip
              auto-start: true

            # ==================== 混合模式死信队列策略 ====================
            # 同时处理全局和类型分组的死信消息
            dlq-hybrid-global:
              stream-key: "dlq:global"
              group: "dlq-hybrid-processors"
              consumer: "dlq-hybrid-global-consumer"
              auto-ack: true
              concurrency: 3
              error-strategy: skip
              auto-start: true

            dlq-hybrid-type:
              stream-key: "dlq:type:UserInfo"
              group: "dlq-hybrid-processors"
              consumer: "dlq-hybrid-type-consumer"
              auto-ack: true
              concurrency: 2
              error-strategy: skip
              auto-start: true




# 日志配置
logging:
  level:
    com.richie.component.cache.redis.utils.com.richie.component.cache.redis.utils.DeadLetterQueueUtil: DEBUG
    com.richie.component.cache.redis.stream: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
