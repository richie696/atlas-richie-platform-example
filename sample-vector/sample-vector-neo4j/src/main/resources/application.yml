server:
  port: 9524

spring:
  application:
    name: sample-vector-neo4j

logging:
  level:
    root: info
    com.richie.component.vector.neo4j: debug

platform:
  component:
    vector:
      neo4j:
        uri: ${NEO4J_URI:bolt://127.0.0.1:7687}
        username: ${NEO4J_USERNAME:neo4j}
        password: ${NEO4J_PASSWORD:}
        label: VectorNode
        dimension: 768


