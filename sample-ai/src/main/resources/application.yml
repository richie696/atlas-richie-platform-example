server:
  port: 9517

spring:
  application:
    name: sample-ai

logging:
  level:
    root: info
    com.richie.component.ai: debug

platform:
  component:
    ai:
      # 配置多模型示例，实际密钥请用环境变量或配置中心注入
      models:
        gpt-4:
          provider: OPENAI
          api-key: ${OPENAI_API_KEY:your-openai-api-key}
          base-url: ${OPENAI_BASE_URL:https://api.openai.com}
          options:
            model: gpt-4o-mini
            max-tokens: 2000
            temperature: 0.7
            top-p: 0.9

        deepseek-chat:
          provider: DEEPSEEK
          api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
          base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
          options:
            model: deepseek-chat
            max-tokens: 2000
            temperature: 0.7
            top-p: 0.9

        zhipu-chatglm:
          provider: ZHIPUAI
          api-key: ${ZHIPUAI_API_KEY:your-zhipuai-api-key}
          base-url: ${ZHIPUAI_BASE_URL:https://open.bigmodel.cn}
          options:
            model: glm-4
            max-tokens: 2000
            temperature: 0.7
            top-p: 0.9

        claude-3:
          provider: ANTHROPIC
          api-key: ${ANTHROPIC_API_KEY:your-anthropic-api-key}
          base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
          options:
            model: claude-3-sonnet-20240229
            max-tokens: 2000
            temperature: 0.7
            top-p: 0.9
            top-k: 40

        ollama-llama2:
          provider: OLLAMA
          base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
          options:
            model: llama2
            max-tokens: 2000
            temperature: 0.7
            top-p: 0.9


