server:
    port: 8087

spring:
    application:
        name: sample-storage-tos
    main:
        allow-bean-definition-overriding: true
        allow-circular-references: false
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# 火山引擎TOS存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: VOLCENGINE_TOS
                # TOS访问域名（示例：tos-cn-beijing.volces.com）
                endpoint: ${VOLCENGINE_TOS_ENDPOINT:tos-cn-beijing.volces.com}
                # 区域
                region: ${VOLCENGINE_TOS_REGION:cn-beijing}
                # 访问密钥ID（Access Key ID,从环境变量 VOLCENGINE_TOS_ACCESS_KEY_ID 注入)
                access-key-id: ${VOLCENGINE_TOS_ACCESS_KEY_ID:}
                # 访问密钥（Secret Access Key,从环境变量 VOLCENGINE_TOS_SECRET_ACCESS_KEY 注入)
                access-key-secret: ${VOLCENGINE_TOS_SECRET_ACCESS_KEY:}
                # 存储桶名称
                bucket-name: ${VOLCENGINE_TOS_BUCKET_NAME:richie-tos-bucket}
                # 桶内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
