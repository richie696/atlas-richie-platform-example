server:
    port: 8083

spring:
    application:
        name: sample-storage-cos
    main:
        allow-bean-definition-overriding: true
        allow-circular-references: false
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB
    profiles:
        include:
            - cache

# 腾讯云COS存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: TENCENT_COS
                # COS访问域名（示例：cos.ap-guangzhou.myqcloud.com）
                endpoint: ${TENCENT_COS_ENDPOINT:cos.ap-guangzhou.myqcloud.com}
                # 区域
                region: ${TENCENT_COS_REGION:ap-nanjing}
                # 访问密钥ID（SecretId,从环境变量 TENCENT_COS_SECRET_ID 注入)
                access-key-id: ${TENCENT_COS_SECRET_ID:}
                # 访问密钥（SecretKey,从环境变量 TENCENT_COS_SECRET_KEY 注入)
                access-key-secret: ${TENCENT_COS_SECRET_KEY:}
                # 存储桶名称
                bucket-name: ${TENCENT_COS_BUCKET_NAME:richie-cos-bucket}
                # 桶内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
