server:
    port: 8081

spring:
    application:
        name: sample-storage-minio
    main:
        allow-bean-definition-overriding: true
        allow-circular-references: false
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# Minio存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: MINIO
                # Minio访问地址（环境变量: MINIO_ENDPOINT,默认本地)
                endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
                # 区域（可选）
                region: ${MINIO_REGION:us-east-1}
                # 访问密钥ID（环境变量: MINIO_ACCESS_KEY_ID,默认空)
                access-key-id: ${MINIO_ACCESS_KEY_ID:}
                # 访问密钥（环境变量: MINIO_ACCESS_KEY_SECRET,默认空)
                access-key-secret: ${MINIO_ACCESS_KEY_SECRET:}
                # 存储桶名称
                bucket-name: ${MINIO_BUCKET_NAME:richie-bucket}
                # 桶内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
