server:
    port: 8088

spring:
    application:
        name: sample-storage-azure
    main:
        allow-bean-definition-overriding: true
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# 微软Azure Blob存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: AZURE_BLOB
                # Azure Blob访问域名（环境变量覆盖)
                endpoint: ${AZURE_BLOB_ENDPOINT:https://youraccount.blob.core.windows.net}
                # 区域（可选）
                region: ${AZURE_BLOB_REGION:eastus}
                # 访问密钥ID（Account Name,环境变量: AZURE_STORAGE_ACCOUNT_NAME)
                access-key-id: ${AZURE_STORAGE_ACCOUNT_NAME:}
                # 访问密钥（Account Key,环境变量: AZURE_STORAGE_ACCOUNT_KEY)
                access-key-secret: ${AZURE_STORAGE_ACCOUNT_KEY:}
                # 容器名称（相当于bucket）
                bucket-name: ${AZURE_BLOB_CONTAINER_NAME:richie-container}
                # 容器内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
