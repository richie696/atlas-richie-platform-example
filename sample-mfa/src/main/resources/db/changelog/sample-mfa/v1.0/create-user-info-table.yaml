databaseChangeLog:
  - changeSet:
      id: create-user-info-table
      author: richie-platform
      changes:
        - createTable:
            tableName: user_info
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: create_id
                  type: VARCHAR(64)
              - column:
                  name: create_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: update_id
                  type: VARCHAR(64)
              - column:
                  name: update_time
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: deleted
                  type: TINYINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - createIndex:
            tableName: user_info
            indexName: mfa_idx_user_info_username
            columns:
              - column:
                  name: username
            unique: true

