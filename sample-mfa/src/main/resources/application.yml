spring:
    application:
        name: sample-mfa
#    profiles:
        # 引入 Redis / DAO / Nacos 等公共配置
#        include: cache,dao
    main:
        allow-bean-definition-overriding: true
        allow-circular-references: true
    mvc:
        pathmatch:
            matching-strategy: ant_path_matcher
        format:
            date-time: yyyy-MM-dd HH:mm:ss
    liquibase:
        # 关闭 Spring Boot 自带的 Liquibase，使用 richie-component-liquibase 组件
        enabled: false
    config:
        import:
            - optional:nacos:platform-cache.yaml?refreshEnabled=true
            - optional:nacos:platform-db.yaml?refreshEnabled=true
            - optional:nacos:sample-mfa.yaml?refreshEnabled=true
    cloud:
        refresh:
            enabled: true
            extra-refreshable: com.zaxxer.hikari.HikariDataSource
        # Spring Cloud Vault 配置（当使用 Vault 作为密钥管理引擎时需要）
#        vault:
#            uri: ${VAULT_URI:http://localhost:8200}
#            token: ${VAULT_TOKEN:}
#            authentication: ${VAULT_AUTHENTICATION:}
#            kv:
#                enabled: false
        # Nacos 服务发现 & 配置中心（示例配置，可按需调整）
        nacos:
            server-addr: 127.0.0.1:8848
            discovery:
                namespace: public
                group: global
            config:
                namespace: public
                group: global
                file-extension: yaml
                refresh-enabled: true
                enable-remote-sync-config: true

server:
    port: 8892

platform:
    component:
        # MFA统一配置（管理模块和验证模块共用）
        mfa:
            # 是否启用MFA功能（总开关）
            enabled: true

            # 管理模块配置（业务服务使用，网关服务可忽略）
            management:
                # 发行方名称（显示在Authenticator应用中）
                issuer: "Richie Inc."
                # 是否启用Controller（业务服务使用）
                controller-enabled: true
                # API路径前缀（业务服务使用）
                api-prefix: /mfa
                # 缓存TTL（小时）
                ttl-hours: 24

            # TOTP配置（管理模块和验证模块共用）
            totp:
                # HMAC算法（SHA1、SHA256、SHA512）
                algorithm: SHA1
                # 验证码位数
                digits: 6
                # 时间窗口周期（秒）
                period: 30
                # 时间窗口（秒，与period相同）
                time-window: 30
                # 窗口大小（容错窗口，±1表示允许前后1个时间窗口）
                window-size: 2
                # 验证码长度（与digits相同）
                code-length: 6

            # 安全策略配置（注意：配置前缀为 platform.component.mfa.management.security）
            security:
                # 密钥管理配置
                key-management:
                    # 密钥提供者
                    provider: local
                    # Vault 密钥管理配置
                    # 本地密钥配置（仅开发环境使用）
                    local:
                        # 密钥（必须通过 MFA_SECRET_KEY 环境变量注入，禁止硬编码）
                        secret-key: ${MFA_SECRET_KEY:}
                        # 加密算法
                        algorithm: "AES/GCM/NoPadding"
                        # GCM IV长度
                        gcm-iv-length: 12
                        # GCM TAG长度
                        gcm-tag-length: 16
                    # Vault 业务配置（连接信息请配置 spring.cloud.vault.*）
                    # 使用前请在 Vault 中启用 KV v2 与 Transit，参见 vault-config/README.md 或 init-engines.sh
                    vault:
                        transit-path: "transit"
                        kv-path: "kv"
                        key-name: "mfa-secret-key"
                        rotation:
                            # 密钥轮转周期（天）
                            grace-period-days: 7
                            # 密钥轮转间隔（天）
                            rotation-interval-days: 90

                # 备份码配置
                backup-code:
                    # 备份码数量
                    count: 10
                    # 备份码长度（位数）
                    length: 8
                    # 哈希算法（BCrypt、SHA256等）
                    hash-algorithm: BCrypt

                # 可信设备配置
                trusted-device:
                    # 是否启用/支持可信设备功能
                    enabled: true
                    # 最大允许的可信设备数量
                    max-devices: 10
                    # 默认信任天数
                    default-trust-days: 30

                # 防重放攻击TTL倍数（TTL = 时间窗口 * replayPreventionTtlMultiplier）
                replay-prevention-ttl-multiplier: 3
                # 最大尝试次数
                max-attempts: 5
                # 账户锁定时长（秒）
                lock-duration-seconds: 300
