spring:
    application:
        name: sample-cache
    profiles:
        include: cache
    main:
        allow-bean-definition-overriding: true
        allow-circular-references: true
    mvc:
        pathmatch:
            matching-strategy: ant_path_matcher
        format:
            date-time: yyyy-MM-dd HH:mm:ss

server:
    port: 8889
    tomcat:
        accept-count: 100

# Redis Stream 消费者配置
platform:
    cache:
        redis:
            stream:
                # 禁用应用内的 OpenTelemetry 自动配置，使用 Java Agent 的配置
                tracing:
                    enabled: true  # 禁用应用内的 OpenTelemetry 配置
                consumers:
                    enabled: true
                    configs:
                        user-events:
                            # 是否自动启动订阅（默认：true，如无特殊情况可不配置该值）
                            auto-start: true
                            # Stream 键名
                            stream-key: "user-events"
                            # 消费者组
                            group: "user-processors"
                            # 消费者实例
                            consumer: "user-consumer"
                            # 目标消息类型（注意，用于传递的消息仅限于com.richie.component.cache.redis.bean.BaseStreamMessage标记接口的实现类）
                            target-type: com.richie.component.cache.domain.UserInfo
                            # 是否启用自动ACK（默认：true）
                            auto-ack: true
                            # 并发消费者数量（默认：1）
                            concurrency: 2
                            # 错误处理策略（默认：SKIP，参考：stream.config.redis.com.richie.component.cache.RedisStreamProperties.ErrorStrategy）
                            error-strategy: retry
                            # 最大重试次数（默认：3次）
                            max-retries: 3
                            # 重试间隔（默认：1秒）
                            retry-delay: 1s
                            # 是否启用幂等（默认：true）
                            idempotency-enabled: true

                        order-events:
                            # 是否自动启动订阅（默认：true，如无特殊情况可不配置该值）
                            auto-start: true
                            # Stream 键名
                            stream-key: "order-events"
                            # 消费者组
                            group: "order-processors"
                            # 消费者实例
                            consumer: "order-consumer"
                            # 目标消息类型（注意，用于传递的消息仅限于com.richie.component.cache.redis.bean.BaseStreamMessage标记接口的实现类）
                            target-type: com.richie.component.cache.domain.OrderInfo
                            # 是否启用自动ACK（默认：true）
                            auto-ack: false
                            # 并发消费者数量（默认：1）
                            concurrency: 4
                            # 错误处理策略（默认：SKIP，参考：stream.config.redis.com.richie.component.cache.RedisStreamProperties.ErrorStrategy）
                            error-strategy: no_ack
                            # 最大重试次数（默认：3次）
                            max-retries: 3
                            # 重试间隔（默认：1秒）
                            retry-delay: 1s
                            # 是否启用幂等（默认：true）
                            idempotency-enabled: true
                monitoring:
                    enabled: true
                    business-monitoring:
                        enabled: true
                    error-monitoring:
                        enabled: true
                    health-check:
                        enabled: true
                    metrics:
                        enabled: true
                    performance:
                        enabled: true
    component:
        http:
            connect-timeout: 10
            call-timeout-timeout: 15

management:
    endpoints:
        web:
            exposure:
                include: "health,info,metrics,prometheus,redis-stream,redis-stream-links"
    endpoint:
        health:
            show-details: always
            access: unrestricted
        metrics:
            access: unrestricted
        prometheus:
            access: unrestricted
    prometheus:
        metrics:
            export:
                enabled: true
